<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassTableData 测试 - FineReport Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #722ed1 0%, #531dab 100%); }
        .navbar-brand, .nav-link { color: white !important; }
        .nav-link:hover { background: rgba(255,255,255,0.1); border-radius: 4px; }
        
        .page-header { background: white; padding: 20px 0; border-bottom: 1px solid #e8e8e8; margin-bottom: 24px; }
        .page-title { font-size: 1.5rem; font-weight: 600; color: #262626; margin: 0; }
        
        .upload-zone {
            border: 2px dashed #d9d9d9;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: #722ed1; background: #f9f0ff; }
        
        .result-section { background: white; border-radius: 8px; padding: 24px; margin-top: 24px; }
        
        .ds-card {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #722ed1;
        }
        .ds-name { font-weight: 600; color: #722ed1; }
        .ds-class { font-family: monospace; font-size: 12px; color: #8c8c8c; }
        
        .param-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: white;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .param-name { font-weight: 500; min-width: 150px; }
        .param-type { font-size: 11px; padding: 1px 6px; border-radius: 3px; margin-left: 8px; }
        .param-type.string { background: #e6f7ff; color: #1890ff; }
        .param-type.number { background: #f6ffed; color: #52c41a; }
        .param-type.date { background: #fff7e6; color: #fa8c16; }
        .param-type.array { background: #f9f0ff; color: #722ed1; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-file-earmark-spreadsheet me-2"></i>FineReport Builder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/cpt-analyze">CPT 分析</a>
                <a class="nav-link" href="/excel-convert">Excel 转换</a>
                <a class="nav-link active" href="/class-test">Class 测试</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <div class="page-header">
        <div class="container">
            <h1 class="page-title"><i class="bi bi-terminal me-2"></i>ClassTableData 交互测试</h1>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="container pb-5">
        <div class="row">
            <!-- 左侧：上传和结果 -->
            <div class="col-lg-8">
                <div class="result-section">
                    <h5 class="mb-3">上传 CPT 文件</h5>
                    <div class="upload-zone" id="uploadZone">
                        <i class="bi bi-file-earmark-code" style="font-size: 48px; color: #722ed1;"></i>
                        <p class="mt-3 mb-0">拖拽 .cpt 文件到此处</p>
                        <p class="text-muted small mb-2">将自动解析 ClassTableData 数据集</p>
                        <button class="btn btn-primary btn-sm">选择文件</button>
                        <input type="file" id="fileInput" accept=".cpt" style="display: none;">
                    </div>
                </div>
                
                <!-- ClassTableData 列表 -->
                <div class="result-section" id="dsSection" style="display: none;">
                    <h5 class="mb-3">
                        <i class="bi bi-database me-2"></i>ClassTableData 列表
                        <span class="badge bg-primary" id="dsCount">0</span>
                    </h5>
                    <div id="dsList"></div>
                </div>
            </div>
            
            <!-- 右侧：配置 -->
            <div class="col-lg-4">
                <div class="result-section">
                    <h5 class="mb-3"><i class="bi bi-gear me-2"></i>生成配置</h5>
                    
                    <div class="mb-3">
                        <label class="form-label">API 端点</label>
                        <input type="text" class="form-control" id="apiEndpoint" 
                               placeholder="http://localhost:8080/data/dashboard/load-data">
                    </div>
                    
                    <input type="hidden" id="uploadedFilename">
                    
                    <button class="btn btn-primary w-100 mb-3" id="generateBtn" disabled>
                        <i class="bi bi-code-slash me-2"></i>生成测试页面
                    </button>
                    
                    <div id="generateResult"></div>
                </div>
                
                <!-- 生成结果 -->
                <div class="result-section" id="resultSection" style="display: none;">
                    <h5 class="mb-3"><i class="bi bi-check-circle text-success me-2"></i>生成成功</h5>
                    <div id="resultInfo" class="mb-3"></div>
                    <div class="d-grid gap-2">
                        <a href="#" class="btn btn-success" id="viewBtn" target="_blank">
                            <i class="bi bi-eye me-2"></i>打开测试页面
                        </a>
                        <a href="#" class="btn btn-outline-primary" id="downloadBtn">
                            <i class="bi bi-download me-2"></i>下载 HTML 文件
                        </a>
                    </div>
                </div>
                
                <!-- 使用说明 -->
                <div class="result-section mt-3">
                    <h5 class="mb-3"><i class="bi bi-lightbulb me-2"></i>使用说明</h5>
                    <ol class="mb-0 small text-muted">
                        <li>上传包含 ClassTableData 的 .cpt 文件</li>
                        <li>配置 API 端点地址</li>
                        <li>点击生成测试页面</li>
                        <li>在浏览器中打开测试页面</li>
                        <li>填写参数并发送请求测试</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        let currentFilename = '';
        
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        function handleFile(file) {
            if (!file || !file.name.endsWith('.cpt')) {
                alert('请上传 .cpt 文件');
                return;
            }
            
            currentFilename = file.name;
            document.getElementById('uploadedFilename').value = file.name;
            
            const formData = new FormData();
            formData.append('file', file);
            
            uploadZone.innerHTML = '<div class="spinner-border text-primary" role="status"></div><p class="mt-3">正在解析...</p>';
            
            fetch('/api/analyze/cpt', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        uploadZone.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                        return;
                    }
                    
                    const classList = data.class_table_data || [];
                    if (classList.length === 0) {
                        uploadZone.innerHTML = `
                            <i class="bi bi-exclamation-triangle" style="font-size: 48px; color: #faad14;"></i>
                            <p class="mt-3 mb-0">未找到 ClassTableData</p>
                            <p class="text-muted small mb-0">该 CPT 文件不包含 ClassTableData 数据集</p>
                        `;
                        return;
                    }
                    
                    renderDSList(classList);
                    document.getElementById('generateBtn').disabled = false;
                    uploadZone.innerHTML = `
                        <i class="bi bi-file-earmark-check" style="font-size: 48px; color: #722ed1;"></i>
                        <p class="mt-3 mb-0">${file.name}</p>
                        <p class="text-muted small mb-0">找到 ${classList.length} 个 ClassTableData</p>
                    `;
                });
        }
        
        function renderDSList(list) {
            document.getElementById('dsSection').style.display = 'block';
            document.getElementById('dsCount').textContent = list.length;
            
            document.getElementById('dsList').innerHTML = list.map(ds => `
                <div class="ds-card">
                    <div class="ds-name">${ds.name}</div>
                    <div class="ds-class">${ds.class_name}</div>
                    <div class="mt-2">
                        <small class="text-muted">参数 (${ds.parameters.length}):</small>
                        <div class="mt-1">
                            ${ds.parameters.slice(0, 5).map(p => `
                                <span class="param-type ${p.type}">${p.name}</span>
                            `).join('')}
                            ${ds.parameters.length > 5 ? `<span class="text-muted small">+${ds.parameters.length - 5} more</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 生成测试页面
        document.getElementById('generateBtn').addEventListener('click', () => {
            const data = {
                filename: currentFilename,
                api_endpoint: document.getElementById('apiEndpoint').value
            };
            
            document.getElementById('generateResult').innerHTML = 
                '<div class="text-center"><div class="spinner-border spinner-border-sm text-primary"></div> 生成中...</div>';
            
            fetch('/api/class-test/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(result => {
                if (result.error) {
                    document.getElementById('generateResult').innerHTML = 
                        `<div class="alert alert-danger">${result.error}</div>`;
                    return;
                }
                
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('resultInfo').innerHTML = `
                    <p class="mb-1"><strong>数据源:</strong> ${result.data_sources.length} 个</p>
                    <ul class="mb-0 small">
                        ${result.data_sources.map(d => `<li>${d.name}</li>`).join('')}
                    </ul>
                `;
                document.getElementById('viewBtn').href = result.view_url;
                document.getElementById('downloadBtn').href = result.download_url;
                document.getElementById('generateResult').innerHTML = '';
            });
        });
    </script>
</body>
</html>
