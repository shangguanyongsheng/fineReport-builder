<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPT 文件分析 - FineReport Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); }
        .navbar-brand, .nav-link { color: white !important; }
        .nav-link:hover { background: rgba(255,255,255,0.1); border-radius: 4px; }
        
        .page-header { background: white; padding: 20px 0; border-bottom: 1px solid #e8e8e8; margin-bottom: 24px; }
        .page-title { font-size: 1.5rem; font-weight: 600; color: #262626; margin: 0; }
        
        .upload-zone {
            border: 2px dashed #d9d9d9;
            border-radius: 8px;
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: #1890ff; background: #e6f7ff; }
        
        .result-section { background: white; border-radius: 8px; padding: 24px; margin-top: 24px; }
        .result-title { font-size: 1.1rem; font-weight: 600; color: #262626; margin-bottom: 16px; }
        
        .data-item { background: #fafafa; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
        .data-item-header { font-weight: 600; color: #1890ff; margin-bottom: 8px; }
        
        .param-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
            background: #f0f0f0;
            color: #595959;
        }
        .param-tag.string { background: #e6f7ff; color: #1890ff; }
        .param-tag.number { background: #f6ffed; color: #52c41a; }
        .param-tag.date { background: #fff7e6; color: #fa8c16; }
        .param-tag.array { background: #f9f0ff; color: #722ed1; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-file-earmark-spreadsheet me-2"></i>FineReport Builder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link active" href="/cpt-analyze">CPT 分析</a>
                <a class="nav-link" href="/excel-convert">Excel 转换</a>
                <a class="nav-link" href="/class-test">Class 测试</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <div class="page-header">
        <div class="container">
            <h1 class="page-title"><i class="bi bi-search me-2"></i>CPT 文件分析</h1>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="container pb-5">
        <!-- 上传区域 -->
        <div class="upload-zone" id="uploadZone">
            <i class="bi bi-cloud-arrow-up" style="font-size: 64px; color: #bfbfbf;"></i>
            <p class="mt-3 mb-1 fs-5">拖拽 .cpt 文件到此处</p>
            <p class="text-muted mb-3">或点击选择文件</p>
            <button class="btn btn-primary">选择文件</button>
            <input type="file" id="fileInput" accept=".cpt" style="display: none;">
        </div>

        <!-- 分析结果 -->
        <div id="resultSection" style="display: none;">
            <!-- 基本信息 -->
            <div class="result-section">
                <h3 class="result-title"><i class="bi bi-info-circle me-2"></i>基本信息</h3>
                <div id="basicInfo"></div>
            </div>
            
            <!-- 数据源 -->
            <div class="result-section">
                <h3 class="result-title"><i class="bi bi-database me-2"></i>数据源 (<span id="dsCount">0</span>)</h3>
                <div id="dataSources"></div>
            </div>
            
            <!-- ClassTableData -->
            <div class="result-section">
                <h3 class="result-title"><i class="bi bi-terminal me-2"></i>ClassTableData (<span id="classCount">0</span>)</h3>
                <div id="classTableData"></div>
            </div>
            
            <!-- 筛选控件 -->
            <div class="result-section">
                <h3 class="result-title"><i class="bi bi-funnel me-2"></i>筛选控件 (<span id="widgetCount">0</span>)</h3>
                <div id="widgets"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        function handleFile(file) {
            if (!file || !file.name.endsWith('.cpt')) {
                alert('请上传 .cpt 文件');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            uploadZone.innerHTML = '<div class="spinner-border text-primary" role="status"></div><p class="mt-3">正在解析...</p>';
            
            fetch('/api/analyze/cpt', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        uploadZone.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                        return;
                    }
                    renderResult(data);
                })
                .catch(err => {
                    uploadZone.innerHTML = `<div class="alert alert-danger">解析失败: ${err}</div>`;
                });
        }
        
        function renderResult(data) {
            document.getElementById('resultSection').style.display = 'block';
            
            // 基本信息
            const summary = data.summary || {};
            document.getElementById('basicInfo').innerHTML = `
                <div class="row">
                    <div class="col-md-3"><strong>文件名:</strong> ${data.filename}</div>
                    <div class="col-md-3"><strong>工作表:</strong> ${summary.sheets_count || 1}</div>
                    <div class="col-md-3"><strong>数据源:</strong> ${summary.data_sources?.length || 0}</div>
                    <div class="col-md-3"><strong>单元格:</strong> ${data.raw_structure?.cell_elements_count || 0}</div>
                </div>
            `;
            
            // 数据源
            const dsList = summary.data_sources || [];
            document.getElementById('dsCount').textContent = dsList.length;
            document.getElementById('dataSources').innerHTML = dsList.map(ds => `
                <div class="data-item">
                    <div class="data-item-header">${ds.name}</div>
                    <div><span class="param-tag">${ds.type}</span> ${ds.database ? `<span class="param-tag">${ds.database}</span>` : ''}</div>
                    ${ds.parameters?.length ? `<div class="mt-2"><small>参数: ${ds.parameters.join(', ')}</small></div>` : ''}
                    ${ds.sql_preview ? `<pre class="mt-2 mb-0 small bg-light p-2 rounded">${ds.sql_preview}</pre>` : ''}
                </div>
            `).join('') || '<p class="text-muted">暂无数据源</p>';
            
            // ClassTableData
            const classList = data.class_table_data || [];
            document.getElementById('classCount').textContent = classList.length;
            document.getElementById('classTableData').innerHTML = classList.map(c => `
                <div class="data-item">
                    <div class="data-item-header">${c.name}</div>
                    <div><code>${c.class_name}</code></div>
                    <div class="mt-2">
                        ${c.parameters.map(p => `<span class="param-tag ${p.type}">${p.name}</span>`).join('')}
                    </div>
                </div>
            `).join('') || '<p class="text-muted">暂无 ClassTableData</p>';
        }
    </script>
</body>
</html>
